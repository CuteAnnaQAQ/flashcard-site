<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markdown Flashcards</title>
    <link rel="stylesheet" href="styles.css">
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]],
          processEscapes: true
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
        },
        startup: {
          pageReady() {
            return MathJax.startup.defaultPageReady().then(() => {
              window.dispatchEvent(new Event("mathjax-ready"));
            });
          }
        }
      };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="shell">
      <aside id="sidebar" class="sidebar">
        <div class="deck-panel">
          <div class="panel-title deck-panel-title">
            <span>牌组树</span>
            <small>cards/</small>
          </div>
          <div id="deck-list" class="deck-list"></div>
        </div>
      </aside>

      <div
        id="sidebar-resizer"
        class="sidebar-resizer"
        role="separator"
        aria-controls="sidebar"
        aria-orientation="vertical"
        aria-valuemin="260"
        aria-valuemax="640"
        aria-valuenow="320"
        aria-label="拖动调整侧边栏宽度"
        tabindex="0"
      ></div>

      <main class="workspace">
        <header class="topbar">
          <div class="topbar-title">
            <div id="deck-title" class="deck-title">未加载卡片</div>
            <div id="deck-meta" class="deck-meta">0 cards</div>
          </div>
          <div class="toolbar">
            <button id="sidebar-toggle" class="tool-button sidebar-toggle" type="button" title="折叠侧边栏" aria-label="折叠侧边栏" aria-expanded="true">☰</button>
            <button id="prev-group-button" class="tool-button" title="上一组卡牌">↑</button>
            <button id="next-group-button" class="tool-button" title="下一组卡牌">↓</button>
            <button id="shuffle-button" class="tool-button" title="洗牌">⇄</button>
            <button id="reset-button" class="tool-button" title="重置进度">⟲</button>
          </div>
        </header>

        <section class="study-area" aria-live="polite">
          <div class="progress-head">
            <span id="progress-label">0 / 0</span>
            <span id="progress-percent">0%</span>
          </div>
          <div class="progress-strip">
            <div id="progress-fill" class="progress-fill"></div>
          </div>

          <article id="card" class="card" tabindex="0">
            <button id="delete-card-button" class="card-delete-button" type="button" title="删除当前卡片" aria-label="删除当前卡片">×</button>
            <div class="card-face">
              <div class="card-kicker" id="card-kicker">Question</div>
              <div class="card-group" id="card-group"></div>
              <div class="card-content" id="card-content">选择 Markdown 卡片</div>
              <div class="card-stats" id="card-stats"></div>
            </div>
          </article>

          <div class="answer-actions">
            <button id="prev-button" class="nav-button" title="上一张">←</button>
            <button id="flip-button" class="flip-button">显示答案</button>
            <button id="next-button" class="nav-button" title="下一张">→</button>
          </div>

          <div class="grade-row">
            <button data-grade="again" class="grade-button again">重来</button>
            <button data-grade="hard" class="grade-button hard">模糊</button>
            <button data-grade="good" class="grade-button good">记住</button>
          </div>
        </section>

        <footer class="queue-dock">
          <div id="review-summary" class="review-summary bottom-review-summary"></div>
        </footer>
      </main>
    </div>

  </body>
</html>
