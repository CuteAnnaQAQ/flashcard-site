<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markdown Flashcards</title>
    <link rel="stylesheet" href="styles.css">
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]],
          processEscapes: true
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
        },
        startup: {
          pageReady() {
            return MathJax.startup.defaultPageReady().then(() => {
              window.dispatchEvent(new Event("mathjax-ready"));
            });
          }
        }
      };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <img src="assets/mark.svg" alt="" class="brand-mark">
          <div>
            <div class="brand-name">LazyCards</div>
            <div class="brand-subtitle">Markdown cards</div>
          </div>
        </div>

        <div class="sidebar-actions">
          <label class="import-button" title="导入本地 Markdown">
            <input id="file-input" type="file" accept=".md,.markdown,.txt,.tsv" multiple>
            导入
          </label>
          <button id="reload-button" class="icon-button" title="重新读取仓库卡片">↻</button>
        </div>

        <div class="deck-panel">
          <div class="panel-title">牌组树</div>
          <div id="deck-list" class="deck-list"></div>
        </div>

        <div class="deck-panel">
          <div class="panel-title">复习队列</div>
          <div class="mode-switch">
            <button class="mode-button active" data-mode="due">待复习</button>
            <button class="mode-button" data-mode="all">全部</button>
          </div>
          <div id="review-summary" class="review-summary"></div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <div id="deck-title" class="deck-title">未加载卡片</div>
            <div id="deck-meta" class="deck-meta">0 cards</div>
          </div>
          <div class="toolbar">
            <button id="shuffle-button" class="tool-button" title="洗牌">⇄</button>
            <button id="reset-button" class="tool-button" title="重置进度">⟲</button>
          </div>
        </header>

        <section class="study-area" aria-live="polite">
          <div class="progress-strip">
            <div id="progress-fill" class="progress-fill"></div>
          </div>

          <article id="card" class="card" tabindex="0">
            <div class="card-face">
              <div class="card-kicker" id="card-kicker">Question</div>
              <div class="card-group" id="card-group"></div>
              <div class="card-content" id="card-content">选择或导入 Markdown 文件</div>
              <div class="card-stats" id="card-stats"></div>
            </div>
          </article>

          <div class="answer-actions">
            <button id="prev-button" class="nav-button" title="上一张">←</button>
            <button id="flip-button" class="flip-button">显示答案</button>
            <button id="next-button" class="nav-button" title="下一张">→</button>
          </div>

          <div class="grade-row">
            <button data-grade="again" class="grade-button again">重来</button>
            <button data-grade="hard" class="grade-button hard">模糊</button>
            <button data-grade="good" class="grade-button good">记住</button>
          </div>
        </section>
      </main>
    </div>

  </body>
</html>
